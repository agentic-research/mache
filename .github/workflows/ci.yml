name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            fuse_setup: sudo apt-get install -y libfuse-dev
          - os: macos-latest
            fuse_setup: brew install --cask fuse-t
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Install FUSE
        run: ${{ matrix.fuse_setup }}

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: task build

      - name: Test
        run: task test

  notify-kiln:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, lint]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Exchange OIDC → GitHub token (octo-sts)
        id: octo-sts
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: agentic-research/kiln
          identity: mache-ci

      - name: Trigger kiln rebuild
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh api repos/agentic-research/kiln/dispatches \
            -f event_type=upstream-update \
            -f 'client_payload[repo]=agentic-research/mache'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Install FUSE headers
        run: sudo apt-get install -y libfuse-dev

      - name: Vet
        run: go vet ./...

      - name: Format check (gofumpt)
        run: |
          set -euo pipefail
          go install mvdan.cc/gofumpt@latest
          gofumpt -d -extra . | tee /dev/stderr | (! grep .)

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: latest

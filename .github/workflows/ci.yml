name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            fuse_setup: sudo apt-get install -y libfuse-dev
          - os: macos-latest
            fuse_setup: brew install --cask fuse-t
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install FUSE
        run: ${{ matrix.fuse_setup }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: task build

      - name: Test
        run: task test

  # Trigger kiln to rebuild the fat binary when mache merges to main
  notify-kiln:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger kiln rebuild
        run: |
          gh api repos/agentic-research/kiln/dispatches \
            -f event_type=upstream-update \
            -f 'client_payload[repo]=agentic-research/mache'
        env:
          GH_TOKEN: ${{ secrets.LEYLINE_PAT }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install FUSE headers
        run: sudo apt-get install -y libfuse-dev

      - name: Vet
        run: go vet ./...

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

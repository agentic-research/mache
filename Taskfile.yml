version: '3'

# Golden path: CI and local dev both use these tasks.
# Workflows (.github/workflows/) should call `task <name>`, never raw go/cargo.

vars:
  BINARY_NAME: bin/mache

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install:
    desc: Build, codesign, and install mache to ~/.local/bin
    deps: [build]
    cmds:
      - mkdir -p ~/.local/bin
      - cp {{.BINARY_NAME}} ~/.local/bin/mache
      - cmd: codesign -s - --force --deep --entitlements entitlements.plist ~/.local/bin/mache
        platforms: [darwin]

  build:
    desc: Build and codesign mache
    vars:
      GIT_COMMIT:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "none"
      BUILD_DATE:
        sh: date -u '+%Y-%m-%dT%H:%M:%SZ'
      GIT_TAG:
        sh: git describe --tags --abbrev=0 2>/dev/null || echo "dev"
    cmds:
      - >-
        go build -tags boltdb
        -ldflags "-X github.com/agentic-research/mache/cmd.Version={{.GIT_TAG}}
        -X github.com/agentic-research/mache/cmd.Commit={{.GIT_COMMIT}}
        -X github.com/agentic-research/mache/cmd.Date={{.BUILD_DATE}}"
        -o {{.BINARY_NAME}} .
      - cmd: codesign -s - --force --deep --entitlements entitlements.plist ./{{.BINARY_NAME}}
        platforms: [darwin]
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
      - entitlements.plist
    generates:
      - "{{.BINARY_NAME}}"

  test:
    desc: Run all tests
    cmds:
      - go test -tags boltdb -race -gcflags=all=-d=checkptr=0 -v ./...

  test-coverage:
    desc: Run tests with coverage
    cmds:
      - go test -v -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code with gofumpt
    cmds:
      - gofumpt -w -extra .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f {{.BINARY_NAME}}
      - rm -f coverage.out coverage.html

  validate:
    desc: Validate example schemas against synthetic SQLite fixtures
    cmds:
      - go test -v -run 'TestEngine_IngestSQLite' ./internal/ingest/

  test-go-schema:
    desc: Validate Go schema by ingesting mache's own source tree (self-hosting smoke test)
    deps: [build]
    cmds:
      - go test -v -run 'TestEngine_IngestTreeSitter_Go' ./internal/ingest/

  fuzz-gen:
    desc: Generate a new "Fuzz-Mutate-Repair" task by breaking a target
    dir: tools/fuzz-gen
    cmds:
      - go run main.go -file target/parser.go -target FuzzParseToken

  check:
    desc: Run all checks (fmt, vet, lint, test, validate)
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test
      - task: validate
